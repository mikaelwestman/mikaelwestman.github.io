<body id="home">
	<common-head></common-head>
	<fonts-component></fonts-component>
	<scripts-component></scripts-component>
	<analytics-component></analytics-component>
	<navigation-component></navigation-component>
	<page-content>
		<div class="home-container">
			<p class="home-text">Mikael Westman. Designs for <a href="digital.html" class="home-software-trigger">phones</a> & <a href="physical.html" class="home-hardware-trigger">homes</a>. Based in Stockholm, Sweden.</p>
		</div>
	</page-content>
	<script>
		window.addEventListener('DOMContentLoaded', () => {
			const TEXT_DURATION = 2500;
			const homeText = document.querySelector('.home-text');

			// Nav logo stroke draw animation
			const navPath = document.querySelector('.nav-center .logo path');
			if (navPath) {
				navPath.setAttribute('fill', 'none');
				navPath.setAttribute('stroke', 'currentColor');
				navPath.setAttribute('stroke-width', '3');
				const length = navPath.getTotalLength();
				navPath.style.strokeDasharray = `${length} ${length * 2}`;
				navPath.style.strokeDashoffset = length;
				requestAnimationFrame(() => requestAnimationFrame(() => {
					navPath.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
					navPath.style.strokeDashoffset = 0;
				}));
			}

			// Fade in text
			requestAnimationFrame(() => requestAnimationFrame(() => {
				if (homeText) { homeText.style.transition = `opacity ${TEXT_DURATION}ms ease`; homeText.style.opacity = 1; }
			}));
		});
	</script>
</body>
</html>
