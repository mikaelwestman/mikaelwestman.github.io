<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" type="image/png" href="icon.png">
	<title>Mikael Westman — Product Designer</title>
	<meta name="description" content="Portfolio of Mikael Westman, Product Designer based in Stockholm.">
	<meta property='og:title' content='Mikael Westman — Product Designer'/>
	<meta property='og:image' content='https://wst.mn/images/3d-pingpong-mikael-westman.jpg'/>
	<meta property='og:description' content='Portfolio of Mikael Westman, Product Designer based in Stockholm.'/>
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="Mikael Westman — Product Designer">
	<meta name="twitter:description" content="Portfolio of Mikael Westman, Product Designer based in Stockholm.">
	<meta name="twitter:image" content="https://wst.mn/images/3d-pingpong-mikael-westman.jpg">
	<link rel="canonical" href="https://wst.mn/">
	<link rel="stylesheet" href="styles.css">
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "Person",
		"name": "Mikael Westman",
		"jobTitle": "Product Designer",
		"url": "https://wst.mn",
		"sameAs": [
			"https://www.linkedin.com/in/mikaelwestman/",
			"https://soundcloud.com/mikael-westman"
		],
		"worksFor": {
			"@type": "Organization",
			"name": "Freelance"
		},
		"alumniOf": [
			{
				"@type": "Organization",
				"name": "Epidemic Sound"
			},
			{
				"@type": "Organization",
				"name": "Square"
			}
		],
		"knowsAbout": ["Product Design", "Furniture Design", "3D Design", "Digital Products"]
	}
	</script>
	<script src="components/common-head.js"></script>
	<script src="components/fonts.js" defer></script>
	<script src="components/scripts.js"></script>
	<script src="components/analytics.js" defer></script>
</head>

<body id="home">
	<common-head></common-head>
	<fonts-component></fonts-component>
	<scripts-component></scripts-component>
	<analytics-component></analytics-component>
	<navigation-component></navigation-component>
	<page-content>
		<div class="home-container">
			<p class="home-top-text">Hello, <a href="about.html" class="home-i-link" data-tooltip="About me">I</a> design <a href="digital.html" class="home-software-trigger" data-tooltip="View digital projects">software</a>.</p>
			<div class="home-logo-wrapper">
				<svg class="home-logo-stroke" viewBox="0 0 438 209" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
					<defs>
						<mask id="logo-mask-default">
							<path class="home-logo-path" d="M40.0107 164.497L82.6558 40.011L144.796 168.011L187.441 40.011L249.581 164.497L292.226 40.011L354.366 164.497L397.011 40.011" stroke="white" stroke-width="80" stroke-linecap="round" stroke-linejoin="round"/>
						</mask>
					</defs>
					<rect class="logo-bg" x="0" y="0" width="438" height="209" mask="url(#logo-mask-default)"/>
					<image class="logo-image-default" href="images/stool-mikael-westman-01.jpg" x="0" y="0" width="438" height="209" preserveAspectRatio="xMidYMid slice" mask="url(#logo-mask-default)"/>
					<image class="logo-image-software" href="images/rolo-radio_mikael-westman_home.jpg" x="0" y="0" width="438" height="209" preserveAspectRatio="xMidYMid slice" mask="url(#logo-mask-default)"/>
					<image class="logo-image-me" href="images/me.jpg" x="0" y="0" width="438" height="209" preserveAspectRatio="xMidYMid slice" mask="url(#logo-mask-default)"/>
					<image class="logo-image-hover" href="images/vattenlilja-mikael-westman-01.jpg" x="0" y="0" width="438" height="209" preserveAspectRatio="xMidYMid slice" mask="url(#logo-mask-default)"/>
				</svg>
			</div>
			<p class="home-bottom-text"><em>And</em> <a href="physical.html" class="home-hardware-trigger" data-tooltip="View physical projects">homeware</a>.</p>
		</div>
	</page-content>
	<script>
		window.addEventListener('DOMContentLoaded', () => {
			const introPath = document.querySelector('.home-logo-path');
			if (!introPath) return;

			const length = introPath.getTotalLength();

			// Intro draw animation
			introPath.style.strokeDasharray = `${length} ${length * 2}`;
			introPath.style.strokeDashoffset = length;
			requestAnimationFrame(() => requestAnimationFrame(() => {
				introPath.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1)';
				introPath.style.strokeDashoffset = 0;
			}));

			const imgDefault = document.querySelector('.logo-image-default');
			const imgSoftware = document.querySelector('.logo-image-software');
			const imgHardware = document.querySelector('.logo-image-hover');
			const imgMe = document.querySelector('.logo-image-me');
			const allImages = [imgDefault, imgSoftware, imgHardware, imgMe];

			function showOnly(target) {
				allImages.forEach(img => { if (img) img.style.opacity = img === target ? 1 : 0; });
			}

			const softwareTrigger = document.querySelector('.home-software-trigger');
			const hardwareTrigger = document.querySelector('.home-hardware-trigger');
			const iLink = document.querySelector('.home-i-link');

			if (softwareTrigger) {
				softwareTrigger.addEventListener('mouseenter', () => showOnly(imgSoftware));
				softwareTrigger.addEventListener('mouseleave', () => showOnly(imgDefault));
			}
			if (hardwareTrigger) {
				hardwareTrigger.addEventListener('mouseenter', () => showOnly(imgHardware));
				hardwareTrigger.addEventListener('mouseleave', () => showOnly(imgDefault));
			}
			if (iLink) {
				iLink.addEventListener('mouseenter', () => showOnly(imgMe));
				iLink.addEventListener('mouseleave', () => showOnly(imgDefault));
			}
		});
	</script>
</body>
</html>
